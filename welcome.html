<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Welcome — Print this · Stretto × Intac · CBF Wine Tasting</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --burgundy-700: #3d0f1f;
      --burgundy-600: #51162a;
      --burgundy-500: #691D30;
      --burgundy-100: #f1dfe4;
      --gold: #b48a4a;
      --gold-soft: #d9c39a;
      --cream: #f8f5f1;
      --cream-deep: #efe8de;
      --ink-900: #14141c;
      --ink-700: #2e2e3a;
      --ink-500: #5e5e6a;
      --ink-400: #8e8e98;
    }

    @page {
      size: letter portrait;
      margin: 0.3in;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--ink-900);
      background: var(--ink-200, #ddd);
      min-height: 100vh;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* On-screen: show a "print this" toolbar + center the page */
    .toolbar {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: var(--ink-900);
      color: white;
      padding: 12px 22px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 14px;
      z-index: 100;
    }
    .toolbar button {
      background: var(--burgundy-500);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toolbar button:hover { background: var(--burgundy-600); }
    .toolbar .hint { color: rgba(255,255,255,0.6); font-size: 12px; }

    /* The page itself — sized like 8.5x11 with print margins */
    .sheet {
      width: 7.9in;
      min-height: 10.4in;
      margin: 80px auto 60px;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 50% -10%, rgba(105, 29, 48, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(180, 138, 74, 0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 0% 80%, rgba(61, 15, 31, 0.05) 0%, transparent 50%);
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      padding: 0.4in 0.5in 0.35in;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Decorative border lines */
    .sheet::before {
      content: "";
      position: absolute;
      top: 0.2in; left: 0.5in; right: 0.5in;
      height: 3px;
      background: linear-gradient(90deg, var(--burgundy-500) 0%, var(--gold) 100%);
    }
    .sheet::after {
      content: "";
      position: absolute;
      bottom: 0.2in; left: 0.5in; right: 0.5in;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-soft) 50%, transparent 100%);
    }

    /* Co-host logo bar */
    .hosts {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 28px;
      align-items: center;
      margin-bottom: 0.2in;
      padding-top: 0.05in;
    }
    .hosts .logo-slot {
      display: flex;
      align-items: center;
    }
    .hosts .logo-slot.stretto { justify-content: flex-start; }
    .hosts .logo-slot.intac { justify-content: flex-end; }
    .hosts .logo-slot.intac img { max-height: 0.75in; width: auto; }
    .hosts .logo-slot.stretto img { max-height: 0.4in; width: auto; }
    .hosts .divider {
      width: 1px;
      height: 0.5in;
      background: var(--gold-soft);
      opacity: 0.6;
    }

    /* Eyebrow */
    .eyebrow {
      text-align: center;
      font-size: 10pt;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--burgundy-500);
      margin-bottom: 0.1in;
    }

    /* Headline */
    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: 60pt;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink-900);
      text-align: center;
      margin: 0 0 0.08in;
    }
    h1 em {
      font-style: italic;
      color: var(--burgundy-500);
    }

    .subhead {
      text-align: center;
      font-size: 15pt;
      color: var(--ink-700);
      font-weight: 400;
      margin: 0 0 0.15in;
      line-height: 1.3;
    }

    /* QR block */
    .qr-block {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.05in 0;
    }
    .qr-card {
      background: white;
      padding: 0.2in;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(105, 29, 48, 0.12);
      border: 1px solid rgba(180, 138, 74, 0.25);
      display: inline-block;
    }
    .qr-card img {
      display: block;
      width: 3.8in;
      height: 3.8in;
    }
    .qr-instruction {
      margin-top: 0.15in;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 20pt;
      color: var(--burgundy-500);
      font-style: italic;
    }
    .qr-instruction svg {
      width: 24px;
      height: 24px;
    }
    .qr-url {
      margin-top: 0.06in;
      font-size: 12pt;
      color: var(--ink-500);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .qr-url strong {
      color: var(--burgundy-500);
      font-weight: 600;
    }

    /* Footer event details */
    .event-footer {
      text-align: center;
      padding-top: 0.12in;
      border-top: 1px dashed rgba(180, 138, 74, 0.4);
      margin-top: 0.12in;
    }
    .event-footer .name {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 16pt;
      color: var(--ink-900);
      margin: 0 0 3px;
    }
    .event-footer .meta {
      font-size: 10pt;
      color: var(--ink-500);
      letter-spacing: 0.03em;
    }
    .event-footer .meta span {
      display: inline-block;
      margin: 0 6px;
    }

    /* Print rules */
    @media print {
      body { background: white; }
      .toolbar { display: none !important; }
      .sheet {
        width: 100%;
        min-height: auto;
        margin: 0;
        box-shadow: none;
        padding: 0.2in 0.15in;
      }
    }

    @media (max-width: 900px) {
      .sheet { width: calc(100vw - 32px); margin: 80px 16px 40px; padding: 0.4in 0.35in; }
      h1 { font-size: 48pt; }
      .hosts .logo-slot { height: 0.55in; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <span class="hint">Welcome sign · ready to print</span>
    <button onclick="window.print()">Print this →</button>
  </div>

  <div class="sheet">

    <div class="hosts">
      <div class="logo-slot stretto">
        <img src="/assets/stretto-logo.svg" alt="Stretto">
      </div>
      <div class="divider"></div>
      <div class="logo-slot intac">
        <img src="/assets/intac-logo-horizontal.png" alt="Intac Advisory">
      </div>
    </div>

    <div class="eyebrow">CBF Wine Tasting · 2026</div>

    <h1>Welcome <em>in</em>.</h1>
    <p class="subhead">Please sign in with your phone so we can stay in touch.</p>

    <div class="qr-block">
      <div class="qr-card">
        <img src="/assets/qr-hello.png" alt="Scan to sign in — opens intacadvisory.com/hello">
      </div>
      <div class="qr-instruction">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 18h.01"/>
          <path d="M7 21h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"/>
        </svg>
        <span>Open your camera · point · tap the link</span>
      </div>
      <div class="qr-url">or visit <strong>intacadvisory.com/hello</strong></div>
    </div>

    <div class="event-footer">
      <p class="name">Hosted by Stretto &amp; Intac Advisory</p>
      <p class="meta">
        <span>Thursday, May 14</span>·<span>2:00 – 5:00 PM</span>·<span>Stonemason Cellars, Santa Rosa</span>
      </p>
    </div>

  </div>

</body>
</html>
